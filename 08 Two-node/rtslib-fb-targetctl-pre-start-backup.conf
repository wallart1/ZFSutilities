# systemd drop-in for rtslib-fb-targetctl.service
# Backs up saveconfig.json before each restore.
# Even if something later saves a degraded config, the last-known-good
# config is always available as saveconfig.json.pre-start
#
# Install to: /etc/systemd/system/rtslib-fb-targetctl.service.d/pre-start-backup.conf

[Service]
ExecStartPre=/bin/bash -c 'f=/etc/rtslib-fb-target/saveconfig.json; [ -f "$f" ] && cp -f "$f" "${f}.pre-start" && echo "targetctl: backed up saveconfig.json" || true'
