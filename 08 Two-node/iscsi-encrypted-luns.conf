# /etc/iscsi-encrypted-luns.conf
# Encrypted zvol iSCSI entries — one per line.
# Format: backstore_name:device_path:target_short_name
#
# This is the single source of truth for which zvols are encrypted.
# Read by:       iscsi-add-encrypted-luns, safe-iscsi-save, restart-iscsi-services, unlock-zfs-keys
# Maintained by: new-vm-disk --encrypted (adds), remove-vm-disk (removes)
#
# Install to: /etc/iscsi-encrypted-luns.conf on the storage host
# NOTE: Replace any existing bash-array-format version of this file.
vm-101-disk-1:/dev/zvol/threeamigos/proxmox/vm-101-disk-1:threeamigos
vm-202-disk-5:/dev/zvol/threeamigos/proxmox/vm-202-disk-5:threeamigos
