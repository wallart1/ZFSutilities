# systemd drop-in for rtslib-fb-targetctl.service
# Ensures ZFS key unlock is attempted before the iSCSI target starts,
# and adds any encrypted LUNs after the service is up.
#
# Install to: /etc/systemd/system/rtslib-fb-targetctl.service.d/wait-for-zfs-keys.conf

[Unit]
After=zfs-keys-unlock.service
Wants=zfs-keys-unlock.service

[Service]
# Add encrypted LUNs if they weren't loaded on first start
ExecStartPost=/usr/local/lib/zfsutilities/bin/iscsi-add-encrypted-luns
