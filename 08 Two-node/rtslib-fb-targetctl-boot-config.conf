# systemd drop-in for rtslib-fb-targetctl.service
# Overrides ExecStart to use the boot-safe config (saveconfig-boot.json) which
# excludes encrypted backstores whose device nodes don't exist until keys are loaded.
#
# Without this, targetctl restore fails the ENTIRE target when any backstore device
# is missing — all LUNs on that target are lost, not just the encrypted ones.
#
# After the service starts with the boot config, ExecStartPost (iscsi-add-encrypted-luns)
# adds the encrypted LUNs back if their keys happen to be loaded.
#
# The boot config is auto-generated by safe-iscsi-save whenever the full config is saved.
# If saveconfig-boot.json doesn't exist yet, falls back to the default saveconfig.json.
#
# Install to: /etc/systemd/system/rtslib-fb-targetctl.service.d/boot-config.conf

[Service]
ExecStart=
ExecStart=/bin/bash -c 'boot=/etc/rtslib-fb-target/saveconfig-boot.json; if [ -f "$boot" ]; then echo "targetctl: restoring boot config (encrypted backstores excluded)"; /usr/bin/targetctl restore "$boot"; else echo "targetctl: boot config not found, using default"; /usr/bin/targetctl restore; fi'
