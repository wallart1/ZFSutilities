# zfscheckagainst.conf — Backup series table
#
# NOTE: This is an example configuration from the original deployment.
# Edit the datasets, counterpart prefixes, and labels below to match your
# own ZFS pools and backup topology.
#
# Each line defines one source→counterpart relationship to check before
# deleting a snapshot. The checkagainst script verifies the snapshot is not
# the last one in common with its counterpart dataset.
#
# Format (space-separated):
#   <dataset>  <qualifiers-to-remove>  <counterpart-prefix>  <label>
#
# <dataset>              Dataset (or subtree) the snapshot belongs to
# <qualifiers-to-remove> Number of leading path segments to strip before
#                        prepending the counterpart prefix (0 = strip none)
# <counterpart-prefix>   Pool or pool/path to prepend after stripping
# <label>                Snapshot label to match (e.g. dailybackup, offsite)
#
# Backup series covered:
#  1)  dailybackup   threeamigos          <---->  fivebays/threeamigos
#  2)  dailybackup   NVME1                <---->  fivebays/NVME1
#  3)  dailybackup   temp                 <---->  z22tb/temp
#  4)  dailybackup   temp                 <---->  z40tb/temp
#  5)  offsite       temp                 <---->  z22tb/temp
#  6)  offsite       temp                 <---->  z40tb/temp
#  7)  offsite       threeamigos          <---->  fivebays/threeamigos
#  8)  offsite       NVME1                <---->  fivebays/NVME1
#  9)  offsite       fivebays             <---->  z22tb/fivebays
# 10)  offsite       fivebays             <---->  z40tb/fivebays

threeamigos          0 fivebays    dailybackup
NVME1                0 fivebays    dailybackup
fivebays/threeamigos 2 threeamigos dailybackup
fivebays/NVME1       2 NVME1       dailybackup
temp                 0 z22tb       dailybackup
temp                 0 z40tb       dailybackup
z22tb/temp           2 temp        dailybackup
z40tb/temp           2 temp        dailybackup
NVME1                0 fivebays    offsite
threeamigos          0 fivebays    offsite
temp                 0 z22tb       offsite
temp                 0 z40tb       offsite
z22tb/temp           2 temp        offsite
z40tb/temp           2 temp        offsite
fivebays/threeamigos 2 threeamigos offsite
fivebays/NVME1       2 NVME1       offsite
fivebays             0 z22tb       offsite
fivebays             0 z40tb       offsite
z22tb/fivebays       2 fivebays    offsite
z40tb/fivebays       2 fivebays    offsite
